name: Build repository

on:
  push:
    branches: [main]
    paths:
      - 'sources.yaml'
      - 'tools/**'
      - 'repository.osiris/**'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-repo
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Build repository
        id: build
        run: python tools/build_repo.py

      - name: Warn about failed sources
        if: steps.build.outputs.had_failures == 'true'
        run: echo "::warning::One or more addon sources failed to update this run. See the job summary above for details."

      - name: Commit and push changes
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          git add zips/ repository.osiris/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: rebuild repository ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed (attempt $attempt), fetching and rebasing..."
            git fetch origin main
            git rebase origin/main
            sleep 5
          done
          echo "::error::Failed to push after 3 attempts."
          exit 1
