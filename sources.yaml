# sources.yaml
# ---------------------------------------------------------------------------
# Declares every THIRD-PARTY addon mirrored into zips/ by tools/build_repo.py,
# grouped into Kodi-version TIERS. Each tier gets its own addons.xml under
# zips/tiers/<tier-name>/, matching a <dir minversion=... maxversion=...>
# block in repository.osiris/addon.xml -- Kodi picks whichever tier's block
# covers its own running version. This mirrors how third-party multi-version
# Kodi repos (e.g. jurialmunkey/repository.jurialmunkey) work: the SAME
# installed repository.osiris zip has to serve every Kodi version a user
# might install it on, unlike Kodi's own built-in official repo (which ships
# a version-matched addon.xml baked into each Kodi release itself and never
# needs this).
#
# Adding a new tier requires updating BOTH this file AND
# repository.osiris/addon.xml's <dir> blocks (bump its version too, so
# already-installed clients pick up the new tier definition). Tier changes
# are rare -- roughly once per new Kodi major version.
#
# The physical zip files themselves are NOT duplicated per tier: they live
# once in a shared zips/<id>/ store, keyed by exact version. If two tiers
# resolve an addon to the identical version (the common case when an addon
# isn't split per Kodi version upstream), only one copy is kept on disk and
# it's only fetched once per build run.
#
# Do NOT add an entry for repository.osiris anywhere here -- it is always
# built automatically (once, non-tiered) from repository.osiris/addon.xml.
#
# Supported "type" values (identical across tiers):
#
#   kodi_repo
#     Upstream is itself a Kodi repository (has its own addons.xml + a
#     datadir of per-addon zips, already correctly shaped). We read the
#     upstream addons.xml, find <addon id=...>, read its version, and
#     download <repo_datadir_url>/<id>/<id>-<version>.zip as-is.
#
#     - id: some.addon.id
#       type: kodi_repo
#       repo_addons_xml_url: "https://example.invalid/upstream-repo/addons.xml"
#       repo_datadir_url: "https://example.invalid/upstream-repo/zips"
#
#   github
#     Upstream addon source lives directly in a GitHub repo (addon.xml at
#     the repo root or in a subfolder), with no pre-built zip. We fetch the
#     repo via GitHub's public archive/codeload URL (no auth, no API rate
#     limiting) and build our own correctly-shaped zip.
#
#     - id: some.addon.id
#       type: github
#       github_repo: "owner/repo"   # "owner/repo"
#       branch: "main"              # match the upstream repo's actual default branch
#       subdir: ""                  # "" if addon.xml is at repo root, else e.g. "some.addon.id"
#       exclude: []                 # optional: top-level names to omit from the zip
#                                    # (e.g. ["tests", ".github"]) when addon.xml lives
#                                    # at repo root alongside non-addon dev/CI files
#
#   zip_url
#     A direct static URL to an already Kodi-addon-shaped zip (e.g. a
#     GitHub Releases asset). Downloaded and re-hosted as-is, after opening
#     it and confirming the addon.xml inside actually matches the declared
#     id (never trusted blindly).
#
#     - id: some.addon.id
#       type: zip_url
#       url: "https://example.invalid/releases/download/v1.2.3/some.addon.id-1.2.3.zip"
#
# Add further entries below by copying one of the three shapes above and
# filling in a real id + source. Removing an entry (from every tier that
# lists it) causes the next build to prune that addon's zip automatically.
# ---------------------------------------------------------------------------

tiers:
  # Kodi 20.9.1 through 21.x ("Omega" and its point releases). Capped at
  # 21.9.0 now that a newer tier exists below, mirroring the exact
  # minversion/maxversion pattern jurialmunkey's own repo uses at each of
  # its Kodi-version transitions (leia->matrix->nexusrepo->omega).
  - name: omega
    minversion: "20.9.1"
    maxversion: "21.9.0"
    addons:
      # a4kSubtitles -- multi-source subtitle downloader. Its addon source
      # lives at the repo root (no separate per-addon folder), alongside
      # dev/CI/test files we don't want in the shipped zip, hence exclude.
      - id: service.subtitles.a4ksubtitles
        type: github
        github_repo: "a4k-openproject/a4kSubtitles"
        branch: "master"
        subdir: ""
        exclude:
          - ".github"
          - ".githooks"
          - ".vscode"
          - "tests"
          - "scripts"
          - "packages"
          - ".coveragerc"
          - ".flake8"
          - ".gitattributes"
          - ".gitignore"
          - "CHANGELOG.md"
          - "requirements.txt"
          - "screenshot-01.png"
          - "screenshot-02.png"
          - "screenshot-03.png"

      # TMDb Helper and Arctic Fuse 3 are both published through
      # jurialmunkey's own Kodi repository. Its "omega" tier is declared
      # open-ended (minversion 20.9.1, no maxversion cap) in
      # repository.jurialmunkey's own addon.xml -- there is no separate
      # "piers" tier there yet, so both our omega and piers tiers below
      # point at the SAME upstream source for these two, on purpose. If
      # jurialmunkey ever adds a distinct piers tier, update the piers
      # copies below to match (check jurialmunkey/repository.jurialmunkey's
      # addon.xml for the current tier list).
      - id: plugin.video.themoviedb.helper
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: skin.arctic.fuse.3
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      # skin.arctic.fuse.3 dependencies not (adequately) covered by Kodi's
      # built-in official repo -- script.skinvariables and
      # script.module.jurialmunkey ARE in the official repo too, but at
      # versions too old to satisfy what the skin/TMDb Helper actually
      # require; script.texturemaker and resource.font.robotocjksc aren't
      # in the official repo at all. All four come from the same
      # jurialmunkey repo as TMDb Helper/Arctic Fuse 3 above.
      #
      # NOTE: script.module.pil (also required by TMDb Helper) is NOT
      # mirrored -- it's a compiled/binary addon (native PIL/Pillow
      # wrapper) with no pre-built release binaries published anywhere and
      # no listing in Kodi's official repo in any tier. This build script
      # only handles portable Python/resource addons; a missing native
      # dependency like this is outside what it can fetch or build.
      - id: script.skinvariables
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: script.texturemaker
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: resource.font.robotocjksc
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: script.module.jurialmunkey
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      # Arctic Mirage screensaver -- styled to match Arctic Fuse 3, by
      # drinfernoo (same skin-maintainer family as jurialmunkey). Its own
      # requirement (script.skinshortcuts) is already covered by Kodi's
      # built-in official repo.
      - id: screensaver.arctic.mirage
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      # Up Next episode-continuation prompt. MoojMidge's actively-maintained
      # fork is NOT used here: it hard-requires script.module.pil (a
      # compiled/binary addon with no pre-built release binaries anywhere)
      # in every 2.x release going back to v2.0.0, so it can't actually
      # install. Sourced from the OFFICIAL mirror rather than im85288's raw
      # GitHub repo (unmaintained since Aug 2024) because Team Kodi's own
      # per-tier packaging declares the correct xbmc.python API version for
      # each Kodi generation (checked: piers build declares 3.0.0; im85288's
      # raw master branch still declares the stale 2.25.0) -- same
      # redundant-but-convenient reasoning as script.trakt/weather.multi.
      - id: service.upnext
        type: kodi_repo
        repo_addons_xml_url: "https://mirrors.kodi.tv/addons/omega/addons.xml"
        repo_datadir_url: "https://mirrors.kodi.tv/addons/omega"

      # Trakt scrobbler. NOTE: this is already in Kodi's own built-in
      # official add-on repository (the one every Kodi install ships
      # with) -- mirroring it here is redundant for that reason, kept only
      # for "everything in one place" convenience. Remove if you'd rather
      # just use Kodi's built-in repo for it.
      #
      # Unlike jurialmunkey's repo, the OFFICIAL Kodi mirror maintains
      # genuinely separate per-major-version folders
      # (leia/matrix/nexus/omega/piers/...), each independently updated --
      # there is no open-ended "current" tier here, so this must match the
      # Kodi major version this tier actually targets.
      - id: script.trakt
        type: kodi_repo
        repo_addons_xml_url: "https://mirrors.kodi.tv/addons/omega/addons.xml"
        repo_datadir_url: "https://mirrors.kodi.tv/addons/omega"

      # Weather (multi-provider, no API key needed). Also already in Kodi's
      # built-in official repo -- mirrored anyway for "everything in one
      # place" convenience, same reasoning as script.trakt above.
      - id: weather.multi
        type: kodi_repo
        repo_addons_xml_url: "https://mirrors.kodi.tv/addons/omega/addons.xml"
        repo_datadir_url: "https://mirrors.kodi.tv/addons/omega"

      - id: plugin.video.pov
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/kodiyashimaru/repo/master/packages/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/kodiyashimaru/repo/master"

      - id: script.module.magneto
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/kodiyashimaru/repo/master/packages/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/kodiyashimaru/repo/master"

  # Kodi 21.9.1+ ("Piers" and beyond, open-ended until a newer tier is
  # added here). This is the primary target -- current main setup is
  # Kodi 22 Piers.
  - name: piers
    minversion: "21.9.1"
    addons:
      - id: service.subtitles.a4ksubtitles
        type: github
        github_repo: "a4k-openproject/a4kSubtitles"
        branch: "master"
        subdir: ""
        exclude:
          - ".github"
          - ".githooks"
          - ".vscode"
          - "tests"
          - "scripts"
          - "packages"
          - ".coveragerc"
          - ".flake8"
          - ".gitattributes"
          - ".gitignore"
          - "CHANGELOG.md"
          - "requirements.txt"
          - "screenshot-01.png"
          - "screenshot-02.png"
          - "screenshot-03.png"

      - id: plugin.video.themoviedb.helper
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: skin.arctic.fuse.3
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      # skin.arctic.fuse.3 dependencies not (adequately) covered by Kodi's
      # built-in official repo -- script.skinvariables and
      # script.module.jurialmunkey ARE in the official repo too, but at
      # versions too old to satisfy what the skin/TMDb Helper actually
      # require; script.texturemaker and resource.font.robotocjksc aren't
      # in the official repo at all. All four come from the same
      # jurialmunkey repo as TMDb Helper/Arctic Fuse 3 above.
      #
      # NOTE: script.module.pil (also required by TMDb Helper) is NOT
      # mirrored -- it's a compiled/binary addon (native PIL/Pillow
      # wrapper) with no pre-built release binaries published anywhere and
      # no listing in Kodi's official repo in any tier. This build script
      # only handles portable Python/resource addons; a missing native
      # dependency like this is outside what it can fetch or build.
      - id: script.skinvariables
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: script.texturemaker
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: resource.font.robotocjksc
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: script.module.jurialmunkey
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      - id: screensaver.arctic.mirage
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/jurialmunkey/repository.jurialmunkey/master/omega/zips"

      # Up Next episode-continuation prompt. Sourced from the OFFICIAL
      # mirror (see omega tier's comment for why, not im85288's raw GitHub
      # repo or MoojMidge's PIL-blocked fork).
      - id: service.upnext
        type: kodi_repo
        repo_addons_xml_url: "https://mirrors.kodi.tv/addons/piers/addons.xml"
        repo_datadir_url: "https://mirrors.kodi.tv/addons/piers"

      - id: script.trakt
        type: kodi_repo
        repo_addons_xml_url: "https://mirrors.kodi.tv/addons/piers/addons.xml"
        repo_datadir_url: "https://mirrors.kodi.tv/addons/piers"

      # Weather (multi-provider, no API key needed). Also already in Kodi's
      # built-in official repo -- mirrored anyway for "everything in one
      # place" convenience, same reasoning as script.trakt above.
      - id: weather.multi
        type: kodi_repo
        repo_addons_xml_url: "https://mirrors.kodi.tv/addons/piers/addons.xml"
        repo_datadir_url: "https://mirrors.kodi.tv/addons/piers"

      - id: plugin.video.pov
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/kodiyashimaru/repo/master/packages/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/kodiyashimaru/repo/master"

      - id: script.module.magneto
        type: kodi_repo
        repo_addons_xml_url: "https://raw.githubusercontent.com/kodiyashimaru/repo/master/packages/addons.xml"
        repo_datadir_url: "https://raw.githubusercontent.com/kodiyashimaru/repo/master"
